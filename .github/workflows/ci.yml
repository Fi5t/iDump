name: CI

on:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-frida:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.frida.outputs.version }}
    steps:
      - id: frida
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(gh api repos/frida/frida/releases/latest --jq '.tag_name')"
          echo "Latest Frida release: ${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  lint:
    needs: resolve-frida
    runs-on: ubuntu-latest

    env:
      FRIDA_VERSION: ${{ needs.resolve-frida.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download Frida devkit
        env:
          DEVKIT_OS: linux
          DEVKIT_ARCH: x86_64
        run: bash scripts/get-devkit.sh "$FRIDA_VERSION"

      - name: Set CGO flags
        run: |
          echo "CGO_CFLAGS=-I${{ github.workspace }}/build/frida-devkit" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-L${{ github.workspace }}/build/frida-devkit" >> "$GITHUB_ENV"

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  ci:
    needs: resolve-frida
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            devkit_os: macos
            devkit_arch: arm64
          - os: ubuntu-latest
            devkit_os: linux
            devkit_arch: x86_64

    runs-on: ${{ matrix.os }}

    env:
      FRIDA_VERSION: ${{ needs.resolve-frida.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download Frida devkit
        shell: bash
        env:
          DEVKIT_OS: ${{ matrix.devkit_os }}
          DEVKIT_ARCH: ${{ matrix.devkit_arch }}
        run: bash scripts/get-devkit.sh "$FRIDA_VERSION"

      - name: Test
        run: make test

      - name: Build
        run: make build
